name: Clean Data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * SUN'
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  clean_and_commit_data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify raw CSVs exist
        run: |
          for f in data/ufc_athletes.csv data/ufc_fights.csv data/ufcstats_data.csv; do
            if [ ! -f "$f" ]; then
              echo "ERROR: $f not found. Run scrapers locally and commit the CSVs first."
              exit 1
            fi
          done
          echo "All raw CSVs present."

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R Dependencies
        run: |
          Rscript -e 'install.packages(c("dplyr", "tidyr", "stringr", "lubridate", "readr", "janitor"))'

      - name: Run Cleaning Script
        run: Rscript ./scripts/cleaning_script.R

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "Automated clean of UFC data"
            git pull --rebase origin main
            git push
          else
            echo "No data changes to commit."
          fi

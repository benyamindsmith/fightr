name: Download and Flatten Fighter Rankings Data

on:
  workflow_dispatch:
  schedule:
    # Runs daily at 6:00 AM UTC
    - cron: "0 6 * * *"

jobs:
  download-and-process:
    runs-on: ubuntu-latest

    env:
      RANKINGS_API_URL: "https://api.octagon-api.com/rankings"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R packages
        run: |
          Rscript -e 'install.packages("pak")'
          Rscript -e 'pak::pkg_install(c("httr2", "jsonlite", "dplyr", "tidyr", "purrr"))'

      - name: Download rankings JSON from API
        run: |
          Rscript scripts/download_rankings.R

      - name: Upload RData artifact
        uses: actions/upload-artifact@v4
        with:
          name: fighter-rankings-data-rdata
          path: data/fighter_rankings.RData

name: UFC Master Data Pipeline

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 6 * * SUN'

permissions:
  contents: write

jobs:
  # ==========================================
  # 1. PARALLEL PYTHON SCRAPING JOBS
  # ==========================================
  scrape_athletes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas beautifulsoup4
      - name: Run Scraper
        run: python ./scripts/scrape_ufc.py
      - name: Upload Raw Data
        uses: actions/upload-artifact@v4
        with:
          name: raw-athletes
          path: data/ufc_athletes.csv
          retention-days: 1

  scrape_fights:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas beautifulsoup4
      - name: Run Scraper
        run: python ./scripts/scrape_fight_history.py
      - name: Upload Raw Data
        uses: actions/upload-artifact@v4
        with:
          name: raw-fights
          path: data/ufc_fights.csv
          retention-days: 1

  scrape_ufcstats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas beautifulsoup4
      - name: Run Scraper
        run: python ./scripts/scrape_ufcstats.py
      - name: Upload Raw Data
        uses: actions/upload-artifact@v4
        with:
          name: raw-ufcstats
          path: data/ufcstats_data.csv
          retention-days: 1

  # ==========================================
  # 2. R CLEANING AND GIT COMMIT JOB
  # ==========================================
  clean_and_commit_data:
    runs-on: ubuntu-latest
    needs: [scrape_athletes, scrape_fights, scrape_ufcstats]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true # Downloads pre-compiled binaries (FAST)

      - name: Download Athletes Data
        uses: actions/download-artifact@v4
        with:
          name: raw-athletes
          path: data/

      - name: Download Fights Data
        uses: actions/download-artifact@v4
        with:
          name: raw-fights
          path: data/

      - name: Download UFCStats Data
        uses: actions/download-artifact@v4
        with:
          name: raw-ufcstats
          path: data/

      - name: Install R Dependencies
        # If cleaning_script.R is written in base R, you can comment out or remove this step entirely.
        run: |
          Rscript -e 'install.packages(c("dplyr", "tidyr", "stringr", "lubridate", "readr", "janitor"))'

      - name: Run Cleaning Script
        run: Rscript ./scripts/cleaning_script.R

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add .

          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "Automated update and clean of UFC data"
            git pull --rebase origin main
            git push
          else
            echo "No data changes to commit."
          fi

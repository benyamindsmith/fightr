name: UFC Data Ingestion and Cleaning Pipeline

on:
  schedule:
    - cron: '0 6 * * SUN'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------
  # PARALLEL SCRAPING JOBS
  # ---------------------------------------------------------
  scrape_athletes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2

      # Runs the script directly from the repo root
      - run: Rscript ufc_scrape.R

      # Explicitly tells GitHub where to find the file the R script just made
      - uses: actions/upload-artifact@v4
        with:
          name: raw-athletes
          path: data/ufc_athletes.RData
          retention-days: 1

  scrape_fights:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2

      - run: Rscript ufcfights_scrape.R

      - uses: actions/upload-artifact@v4
        with:
          name: raw-fights
          path: data/ufc_fights.RData
          retention-days: 1

  scrape_ufcstats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2

      - run: Rscript ufcstats_scrape.R

      - uses: actions/upload-artifact@v4
        with:
          name: raw-ufcstats
          path: data/ufcstats_data.RData
          retention-days: 1

  # ---------------------------------------------------------
  # THE CLEANING & COMMIT JOB
  # ---------------------------------------------------------
  clean_and_commit_data:
    runs-on: ubuntu-latest
    needs: [scrape_athletes, scrape_fights, scrape_ufcstats]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      # Downloads the artifacts and recreates them in the data/ folder
      # so your cleaning script's load() functions find them exactly where expected
      - name: Download Athletes Data
        uses: actions/download-artifact@v4
        with:
          name: raw-athletes
          path: data/

      - name: Download Fights Data
        uses: actions/download-artifact@v4
        with:
          name: raw-fights
          path: data/

      - name: Download UFCStats Data
        uses: actions/download-artifact@v4
        with:
          name: raw-ufcstats
          path: data/

      - name: Install R Dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::dplyr
            any::tidyr
            any::stringr
            any::lubridate
            any::readr
            any::janitor

      # Runs your master cleaning script from the root
      - name: Run Cleaning Script
        run: Rscript clean_data.R

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add data/

          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "Automated daily scrape and clean of UFC data"
            git pull --rebase origin main
            git push
          else
            echo "No data changes to commit."
          fi

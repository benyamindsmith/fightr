name: UFC Fights Scraper

on:
  # Allows you to trigger the workflow manually from the Actions tab
  workflow_dispatch:
  # Runs automatically at midnight on the 1st of every month
  # schedule:
  #   - cron: '0 0 1 * *'

# Explicitly grant write permissions to the repository so the bot can push files
permissions:
  contents: write

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas pyreadr

      - name: Run Scraper Script
        run: python ./scripts/scrape_fight_history.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # Update these paths if you are saving to a data/ folder
          git add .

          # Check if there are changes to commit
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "Automated update of UFC fighter data"

            # Pull any changes that happened during the ~40 minute scraping window
            git pull --rebase origin main

            git push
          else
            echo "No data changes to commit."
          fi

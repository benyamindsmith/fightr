          python-version: '3.9'name: UFCStats Scraper

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 0 1 * *'

permissions:
  contents: write

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas

      - name: Run scraper script
        run: python ./scripts/scrape_ufcstats.py

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Convert CSV to RData
        run: |
          Rscript -e 'ufcstats_data <- read.csv("./data/ufcstats_data.csv"); save(ufcstats_data, file="./data/ufcstats_data.RData")'

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add ./data/ufcstats_data.csv ./data/ufcstats_data.RData

          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Automated update of UFC fighter data"
            git pull --rebase origin main
            git push
          fi

      - name: Install python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas pyreadr

      - name: Run Scraper Script
        run: python ./scripts/scrape_ufcstats.py
      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # Update these paths if you are saving to a data/ folder
          git add .

          # Check if there are changes to commit
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "Automated update of UFC fighter data"

            # Pull any changes that happened during the ~40 minute scraping window
            git pull --rebase origin main

            git push
          else
            echo "No data changes to commit."
          fi

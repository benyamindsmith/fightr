name: UFCStats Scraper

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 0 1 * *'

permissions:
  contents: write

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas pyreadr

      - name: Run scraper script
        run: python ./scripts/scrape_ufcstats.py

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Convert CSV to RData
        run: |
          Rscript -e 'ufcstats_data <- read.csv("./data/ufcstats_data.csv"); save(ufcstats_data, file="./data/ufcstats_data.RData")'

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add ./data/ufcstats_data.csv ./data/ufcstats_data.RData

          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Automated update of UFC fighter data"
            git pull --rebase origin main
            git push
          fi
